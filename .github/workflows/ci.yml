name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  UV_VERSION: "latest"
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  typecheck:
    name: Type Check (ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - run: uv run ty check src/ types/

  test:
    name: All Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --frozen
      - run: uv run pytest tests/ -v --cov=src --cov-fail-under=95

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/krita-cli
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish-conda:
    name: Publish to Conda
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: 3.12
          channels: conda-forge,defaults
      - name: Build conda package
        shell: bash -l {0}
        run: |
          conda install -y conda-build
          conda build conda-recipe/ --output-folder dist/conda
          PKG_FILE=$(find dist/conda -name "krita-cli-*.tar.bz2" -o -name "krita-cli-*.conda" | head -n 1)
          if [ -z "$PKG_FILE" ]; then
            echo "No package file found!"
            exit 1
          fi
          echo "PKG_FILE=$PKG_FILE" >> "$GITHUB_ENV"
      - name: Upload to Anaconda.org
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          # Resolve username from token
          USERNAME=$(curl -fsSL -H "Authorization: token $ANACONDA_API_TOKEN" \
            https://api.anaconda.org/user | python3 -c "import sys,json; print(json.load(sys.stdin)['login'])")
          echo "Uploading as $USERNAME"
          # Create package if it doesn't exist yet
          curl -sS -X POST \
            -H "Authorization: token $ANACONDA_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"krita-cli","summary":"SOTA CLI + MCP server for programmatic painting in Krita","license":"MIT","is_private":false}' \
            "https://api.anaconda.org/package/$USERNAME/krita-cli" || true
          # Upload via REST API
          curl -fsSL -X POST \
            -H "Authorization: token $ANACONDA_API_TOKEN" \
            -F "distribution=@$PKG_FILE" \
            -F "force=1" \
            "https://api.anaconda.org/package/$USERNAME/krita-cli/files/"
